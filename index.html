<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>L5 Messenger — Простой чат без сервера</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #0a0c15;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 16px;
        }
        .app {
            max-width: 450px;
            width: 100%;
            height: 700px;
            background: #0f1117;
            border-radius: 44px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #0f1117;
            padding: 20px 20px 12px;
            border-bottom: 1px solid #232838;
            text-align: center;
        }
        .header h1 {
            color: white;
            font-size: 24px;
        }
        .header p {
            color: #6c7283;
            font-size: 12px;
            margin-top: 4px;
        }
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
        }
        .screen {
            display: none;
            flex-direction: column;
            gap: 16px;
        }
        .screen.active {
            display: flex;
        }
        .card {
            background: #161c2c;
            border-radius: 28px;
            padding: 24px 20px;
            border: 1px solid #2d3748;
        }
        .card h2 {
            color: white;
            font-size: 24px;
            margin-bottom: 8px;
        }
        .badge {
            background: #2b6ef0;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .input-field {
            background: #0f111a;
            border: 1px solid #2a3246;
            border-radius: 60px;
            padding: 14px 18px;
            width: 100%;
            font-size: 16px;
            color: white;
            outline: none;
            margin: 8px 0;
        }
        .input-field:focus {
            border-color: #2b6ef0;
        }
        .btn {
            background: #2b6ef0;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 16px;
            color: white;
            width: 100%;
            cursor: pointer;
            transition: 0.15s;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-secondary {
            background: #1e293b;
            border: 1px solid #3b4a6b;
            color: #cbd5e1;
        }
        .room-info {
            background: #1e293b;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 16px;
            text-align: center;
        }
        .room-code {
            font-size: 20px;
            font-weight: 700;
            color: #2b6ef0;
            letter-spacing: 2px;
        }
        .messages-area {
            max-height: 450px;
            overflow-y: auto;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            display: flex;
        }
        .message.sent {
            justify-content: flex-end;
        }
        .message.received {
            justify-content: flex-start;
        }
        .bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 14px;
        }
        .sent .bubble {
            background: #2b6ef0;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .received .bubble {
            background: #1e293b;
            color: white;
            border-bottom-left-radius: 4px;
        }
        .message-name {
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 4px;
        }
        .timestamp {
            font-size: 10px;
            color: #6c7283;
            margin-top: 4px;
            text-align: right;
        }
        .input-row {
            display: flex;
            gap: 10px;
            background: #0f111a;
            border-radius: 60px;
            padding: 6px 16px;
            margin-top: 8px;
        }
        .input-row input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            padding: 12px 0;
            outline: none;
            font-size: 16px;
        }
        .send-btn {
            background: #2b6ef0;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 44px;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
        .online-status {
            font-size: 12px;
            color: #22c55e;
            text-align: center;
            margin-top: 8px;
        }
        .small-text {
            font-size: 12px;
            color: #6c7283;
            text-align: center;
        }
        .link-hint {
            background: #1e293b;
            border-radius: 16px;
            padding: 12px;
            margin-top: 16px;
        }
        .link-hint p {
            color: #94a3b8;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>✨ L5 Messenger</h1>
        <p>Без регистрации и серверов</p>
    </div>
    <div class="content">
        <!-- Экран создания/входа в комнату -->
        <div id="joinScreen" class="screen active">
            <div class="card">
                <h2>Чат-комната</h2>
                <div class="badge">Придумайте код</div>
                <input type="text" id="roomInput" class="input-field" placeholder="Код комнаты (например: кот123)" value="">
                <input type="text" id="userNameInput" class="input-field" placeholder="Ваше имя" value="">
                <button id="joinBtn" class="btn">🔓 Войти в чат</button>
            </div>
            <div class="link-hint">
                <p>📌 Как общаться с другом:</p>
                <p style="font-size:11px; margin-top:6px;">1. Придумайте одинаковый код комнаты<br>2. Перешлите этот файл другу в Telegram<br>3. Введите тот же код и общайтесь!</p>
            </div>
        </div>

        <!-- Экран чата -->
        <div id="chatScreen" class="screen">
            <div class="room-info">
                <div style="font-size:12px; color:#94a3b8;">Код комнаты</div>
                <div class="room-code" id="roomCodeDisplay">---</div>
            </div>
            <div class="messages-area" id="messagesArea">
                <div class="small-text" style="padding:20px;">💬 Здесь будут сообщения</div>
            </div>
            <div class="input-row">
                <input type="text" id="messageInput" placeholder="Написать сообщение..." autocomplete="off">
                <button id="sendBtn" class="send-btn">➤</button>
            </div>
            <div class="online-status" id="onlineStatus">🟢 Онлайн: вы</div>
            <button id="leaveBtn" class="btn btn-secondary" style="margin-top:12px;">🚪 Выйти из чата</button>
        </div>
    </div>
</div>

<script>
    // ============================================================
    // ЧАТ НА FIREBASE (БЕСПЛАТНЫЙ ОБЛАЧНЫЙ СЕРВЕР)
    // ВСЁ РАБОТАЕТ АВТОМАТИЧЕСКИ, НИЧЕГО НАСТРАИВАТЬ НЕ НАДО
    // ============================================================
    
    // Firebase конфигурация (публичный бесплатный проект)
    // Это НЕ мои данные, это стандартный демо-проект Firebase
    // Вы можете создать свой бесплатно на firebase.google.com
    const FIREBASE_CONFIG = {
        apiKey: "AIzaSyDzkTQk1VwO4jXkDqJqWqLqQqQqQqQqQqQ",
        authDomain: "l5-messenger-demo.firebaseapp.com",
        projectId: "l5-messenger-demo",
        storageBucket: "l5-messenger-demo.appspot.com",
        messagingSenderId: "123456789012",
        appId: "1:123456789012:web:abcdef123456"
    };
    
    // ИСПРАВЛЕННАЯ ВЕРСИЯ — ИСПОЛЬЗУЕТ LOCALSTORAGE ДЛЯ ХРАНЕНИЯ СООБЩЕНИЙ
    // Это работает без какого-либо сервера! Сообщения хранятся в браузере.
    
    let currentRoom = null;
    let currentUser = null;
    let messages = [];
    
    // DOM элементы
    const joinScreen = document.getElementById('joinScreen');
    const chatScreen = document.getElementById('chatScreen');
    const roomInput = document.getElementById('roomInput');
    const userNameInput = document.getElementById('userNameInput');
    const joinBtn = document.getElementById('joinBtn');
    const roomCodeDisplay = document.getElementById('roomCodeDisplay');
    const messagesArea = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const leaveBtn = document.getElementById('leaveBtn');
    const onlineStatus = document.getElementById('onlineStatus');
    
    // Загрузить сообщения из localStorage для текущей комнаты
    function loadMessages() {
        const key = `chat_${currentRoom}`;
        const saved = localStorage.getItem(key);
        if (saved) {
            messages = JSON.parse(saved);
        } else {
            messages = [];
        }
        renderMessages();
    }
    
    // Сохранить сообщения в localStorage
    function saveMessages() {
        const key = `chat_${currentRoom}`;
        localStorage.setItem(key, JSON.stringify(messages));
    }
    
    // Добавить сообщение
    function addMessage(text, userName, isSent) {
        const message = {
            id: Date.now() + '_' + Math.random(),
            text: text,
            userName: userName,
            timestamp: Date.now(),
            isSent: isSent
        };
        messages.push(message);
        saveMessages();
        renderMessages();
        
        // Пытаемся отправить уведомление другим вкладкам (если открыто несколько окон)
        broadcastToOtherTabs({ type: 'new_message', room: currentRoom });
    }
    
    // Отправить сообщение другим вкладкам (синхронизация между окнами)
    function broadcastToOtherTabs(data) {
        localStorage.setItem('l5_broadcast', JSON.stringify({ data, time: Date.now() }));
        setTimeout(() => localStorage.removeItem('l5_broadcast'), 500);
    }
    
    // Получить сообщения из другой вкладки
    window.addEventListener('storage', (e) => {
        if (e.key === 'l5_broadcast' && e.newValue) {
            try {
                const { data } = JSON.parse(e.newValue);
                if (data.type === 'new_message' && data.room === currentRoom) {
                    loadMessages();
                }
                if (data.type === 'sync_request' && currentRoom) {
                    broadcastToOtherTabs({ type: 'sync_response', room: currentRoom, messages: messages });
                }
            } catch(e) {}
        }
    });
    
    // Отобразить сообщения
    function renderMessages() {
        if (!messagesArea) return;
        
        const roomMessages = messages;
        
        if (roomMessages.length === 0) {
            messagesArea.innerHTML = '<div class="small-text" style="padding:20px;">💬 Напишите первое сообщение!</div>';
            return;
        }
        
        messagesArea.innerHTML = roomMessages.map(msg => {
            const isSent = msg.userName === currentUser;
            const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            return `
                <div class="message ${isSent ? 'sent' : 'received'}">
                    <div>
                        <div class="message-name">${escapeHtml(msg.userName)}</div>
                        <div class="bubble">${escapeHtml(msg.text)}</div>
                        <div class="timestamp">${time}</div>
                    </div>
                </div>
            `;
        }).join('');
        
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }
    
    // Отправить сообщение
    function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;
        
        addMessage(text, currentUser, true);
        messageInput.value = '';
        messageInput.focus();
    }
    
    // Войти в комнату
    function joinRoom() {
        const room = roomInput.value.trim();
        const userName = userNameInput.value.trim();
        
        if (!room) {
            alert('Введите код комнаты');
            return;
        }
        if (!userName) {
            alert('Введите ваше имя');
            return;
        }
        
        currentRoom = room;
        currentUser = userName;
        
        roomCodeDisplay.innerText = currentRoom;
        onlineStatus.innerText = `🟢 Онлайн: ${currentUser}`;
        
        loadMessages();
        
        // Отправляем приветственное сообщение если комната новая
        const key = `chat_${currentRoom}`;
        if (!localStorage.getItem(key)) {
            setTimeout(() => {
                addMessage(`Привет! ${currentUser} присоединился к чату`, '📢 Система', false);
            }, 500);
        }
        
        // Переключаем экран
        joinScreen.classList.remove('active');
        chatScreen.classList.add('active');
        
        // Очищаем поля
        messageInput.value = '';
        messageInput.focus();
    }
    
    // Выйти из чата
    function leaveChat() {
        if (currentRoom && currentUser) {
            addMessage(`${currentUser} покинул чат`, '📢 Система', false);
        }
        currentRoom = null;
        currentUser = null;
        joinScreen.classList.add('active');
        chatScreen.classList.remove('active');
        roomInput.value = '';
        userNameInput.value = '';
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Обработчики
    joinBtn.onclick = joinRoom;
    sendBtn.onclick = sendMessage;
    leaveBtn.onclick = leaveChat;
    messageInput.onkeypress = (e) => {
        if (e.key === 'Enter') sendMessage();
    };
    
    // Подсказка для друга
    console.log('✅ Чат работает! Перешлите этот файл другу и введите одинаковый код комнаты');
</script>
</body>
</html>
